ai_usage_summary: |
  ChatGPT was used as a development assistant for brainstorming,
  debugging, architecture discussions, code refactoring, documentation,
  and improving the Streamlit interface. All implementation, testing,
  integration, and validation of the ranking pipeline were completed by
  the author. No candidate data was sent to external APIs during ranking,
  and the final inference pipeline runs completely offline.

# ============================================================================
# Approach summary
# ============================================================================

methodology_summary: |
  RecruitRankAI is an AI-powered candidate ranking system that combines
  semantic retrieval with hybrid feature-based ranking. Candidate profiles
  are preprocessed to extract structured information including skills,
  experience, education, certifications, recruiter behaviour, and career
  stability. Candidate documents are embedded using the
  sentence-transformers/all-MiniLM-L6-v2 model and indexed with FAISS for
  efficient semantic retrieval. The hybrid ranker combines semantic
  similarity, skill matching, experience fit, technical strength,
  education, behaviour, career stability, and location preference into a
  weighted final score. Explainable reasoning is generated for every ranked
  candidate to improve recruiter transparency. The Streamlit application
  demonstrates the complete pipeline from Job Description input to ranked
  CSV generation within the required CPU compute budget.

